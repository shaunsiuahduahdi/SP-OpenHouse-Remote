name: system_reboot
description: Question Pool Manager for System Reboot game

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.12.0
  cloud_firestore: ^5.6.0
  file_picker: ^8.0.0
  http: ^1.6.0
  archive: 3.6.1
  file_saver: ^0.3.1
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1


flutter_icons:
  android: true
  ios: false
  image_path: "web/icons/Control.png"  

flutter:
  uses-material-design: true
  assets:
    - assets/presets/